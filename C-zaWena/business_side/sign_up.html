<!DOCTYPE html>
<html>
    <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>@C-zaWena#homepage</title>
        <link  href="style.css" rel="stylesheet">
         </head>
    <body>

         <input type="checkbox" id="tick" class="inp_btn">
      <header>
        <div class="mainInfo">

         <h1 style="margin-left: 2%;"> C-zaWena </h1>
         
               
       <label style="margin-top: 7%; font-size: 25px;" class="toggle_nav" for="tick" >Menu</label>
         
      </header>
      <div class="paymentForm">
        <h2 style="color: rgb(35, 19, 19);">Cza-Wena</h2>  
      <form style="display: flex; flex-wrap: wrap; flex-direction: column;  color:antiquewhite" id="visibleForm">
        <label>Enter Business name:</label>
        <input name="business_name"/>
        <label>Service  Type:</label>
        <select name="service">
          <option>
            Funeral service provider
          </option>
          <option>
            Rental Property
          </option>
          <option>
            School Transport
          </option>
        </select>

        <label>Enter  Client name:</label>
        <input name="clientName"  />
        <label>Enter  ID :</label>
        <input name="ID"  />
        <label>Enter  Amount:</label>
        <input name="amount">
    <input style="background-color: green; color:antiquewhite; margin-top: 5%;" type="submit" value="SUBMIT">
        </form>
      </div>

  
    <footer>

        <div class="end">
           <p>
            @Mthiyane_Software Solutions
           </p>
           <p> C-zaWena  online payment platform for cash users</p>
        </div>

    </footer>
      <script>
    document.getElementById("visibleForm").addEventListener('submit',async function(event){
     event.preventDefault();
    
     const myform = document.getElementById("visibleForm");
     const sentForm = new FormData(myform);

     const response = await fetch('https://project.c-zwena.co.za/sign_up',
      {
        method:'Post',
        body: sentForm
      });

   
      if (!response.ok){
        throw new Error(`HTTP error: ${response.status}`);
            }

      const data = await response.json();
      console.log("Do for dollars ")
      const status = data.status;
      console.log('Success:', status);
      if(status == "OK"){
        console.log('Smile')
        window.location.assign("welcome.html");
      }
      });

                   </script>
    </body>
    

</html>
